# Node 3 netplan 配置
# 公网: 202.151.179.228/27  管理网: 10.0.10.3/24
# Ceph Public: 10.0.20.3/24  Ceph Cluster: 10.0.30.3/24
network:
  version: 2
  renderer: networkd

  ethernets:
    eno1:
      # MTU 9000: 必须显式设置，确保 VLAN eno1.20 (Ceph) jumbo frames 正常
      # br-pub MTU 1500 不应覆盖此值，应用后需验证: ip link show eno1
      mtu: 9000
      dhcp4: false
      dhcp6: false
    eno2:
      mtu: 9000
      dhcp4: false
      dhcp6: false
      addresses:
        - 10.0.30.3/24

  vlans:
    eno1.10:
      id: 10
      link: eno1
      mtu: 1500
      addresses:
        - 10.0.10.3/24
    eno1.20:
      id: 20
      link: eno1
      mtu: 9000
      addresses:
        - 10.0.20.3/24

  bridges:
    br-pub:
      interfaces:
        - eno1
      mtu: 1500
      dhcp4: false
      dhcp6: false
      addresses:
        - 202.151.179.228/27
      routes:
        - to: default
          via: 202.151.179.225
      nameservers:
        addresses:
          - 223.5.5.5
          - 8.8.8.8
