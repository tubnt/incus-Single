global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "node_name"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: default
  routes:
    - match:
        severity: critical
      receiver: default
      repeat_interval: 1h

receivers:
  - name: default
    # TODO: 配置实际告警通知渠道（webhook / 邮件 / 企业微信等）
