services:
  paymenter:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment: &paymenter-env
      APP_NAME: "${APP_NAME:-Paymenter}"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: "https://${DOMAIN}"
      APP_KEY: "${APP_KEY}"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: "3306"
      DB_DATABASE: paymenter
      DB_USERNAME: paymenter
      DB_PASSWORD: "${DB_PASSWORD}"
      CACHE_DRIVER: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
      MAIL_MAILER: smtp
      MAIL_HOST: "${SMTP_HOST}"
      MAIL_PORT: "${SMTP_PORT:-587}"
      MAIL_USERNAME: "${SMTP_USER}"
      MAIL_PASSWORD: "${SMTP_PASS}"
      MAIL_ENCRYPTION: tls
      MAIL_FROM_ADDRESS: "${MAIL_FROM_ADDRESS}"
      MAIL_FROM_NAME: "${APP_NAME:-Paymenter}"
    volumes:
      - app_storage:/var/www/html/storage
      - ./extensions:/var/www/html/extensions
      - ./certs:/var/www/html/certs:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  queue-worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--max-time=3600"]
    environment:
      <<: *paymenter-env
    volumes:
      - app_storage:/var/www/html/storage
      - ./extensions:/var/www/html/extensions
      - ./certs:/var/www/html/certs:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["sh", "-c", "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"]
    environment:
      <<: *paymenter-env
    volumes:
      - app_storage:/var/www/html/storage
      - ./extensions:/var/www/html/extensions
      - ./certs:/var/www/html/certs:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - internal

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_DATABASE: paymenter
      MYSQL_USER: paymenter
      MYSQL_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: "${DOMAIN}"
    volumes:
      - ./nginx/templates:/etc/nginx/templates:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - paymenter
    networks:
      - internal

  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  # 占位：Phase4A-3 实现 WebSocket 串口代理
  console-proxy:
    image: alpine:3.19
    restart: "no"
    entrypoint: ["sh", "-c", "echo 'console-proxy placeholder — Phase4A-3 实现' && sleep infinity"]
    volumes:
      - ./certs:/certs:ro
    networks:
      - internal
    profiles:
      - console

volumes:
  mysql_data:
  redis_data:
  app_storage:

networks:
  internal:
    driver: bridge
