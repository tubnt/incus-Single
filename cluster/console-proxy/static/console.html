<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VM 控制台</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1e1e1e;
      color: #d4d4d4;
      font-family: system-ui, -apple-system, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      background: #2d2d2d;
      border-bottom: 1px solid #404040;
      font-size: 14px;
    }
    #header .vm-name { font-weight: bold; color: #569cd6; }
    #header .status { display: flex; align-items: center; gap: 6px; }
    #header .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #666;
    }
    #header .status-dot.connected { background: #4ec9b0; }
    #header .status-dot.error { background: #f44747; }
    #terminal-container {
      flex: 1;
      padding: 4px;
    }
  </style>
</head>
<body>
  <div id="header">
    <span>控制台: <span class="vm-name" id="vmLabel">-</span></span>
    <span class="status">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">未连接</span>
    </span>
  </div>
  <div id="terminal-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script>
    (function() {
      const params = new URLSearchParams(window.location.search);
      const vm = params.get('vm');
      const token = params.get('token');

      if (!vm || !token) {
        document.getElementById('statusText').textContent = '缺少 vm 或 token 参数';
        document.getElementById('statusDot').classList.add('error');
        return;
      }

      document.getElementById('vmLabel').textContent = vm;

      // 初始化终端
      const term = new Terminal({
        cursorBlink: true,
        fontSize: 14,
        fontFamily: "'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace",
        theme: {
          background: '#1e1e1e',
          foreground: '#d4d4d4',
          cursor: '#d4d4d4',
        },
      });

      const fitAddon = new FitAddon.FitAddon();
      term.loadAddon(fitAddon);
      term.open(document.getElementById('terminal-container'));
      fitAddon.fit();

      window.addEventListener('resize', function() { fitAddon.fit(); });

      // WebSocket 连接
      const proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      const wsURL = proto + '//' + window.location.host + '/console/' +
        encodeURIComponent(vm) + '?token=' + encodeURIComponent(token);

      const statusDot = document.getElementById('statusDot');
      const statusText = document.getElementById('statusText');

      term.writeln('正在连接 ' + vm + ' ...');

      const ws = new WebSocket(wsURL);

      ws.onopen = function() {
        statusDot.classList.add('connected');
        statusText.textContent = '已连接';
        term.writeln('连接成功\r\n');
        term.focus();
      };

      ws.onmessage = function(e) {
        term.write(e.data);
      };

      ws.onerror = function() {
        statusDot.classList.remove('connected');
        statusDot.classList.add('error');
        statusText.textContent = '连接错误';
      };

      ws.onclose = function(e) {
        statusDot.classList.remove('connected');
        statusText.textContent = '已断开 (' + e.code + ')';
        term.writeln('\r\n\r\n[连接已关闭]');
      };

      // 终端输入 → WebSocket
      term.onData(function(data) {
        if (ws.readyState === WebSocket.OPEN) {
          ws.send(data);
        }
      });
    })();
  </script>
</body>
</html>
